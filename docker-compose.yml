services:

  backend:
    image: backend:1.0.2
    pull_policy: never
    container_name: backend_server
    build: ./apps/backend/Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - ./apps/backend/.env.docker
    depends_on:
      - database
      - ollama

  database:
    image: qdrant/qdrant
    container_name: database_qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant-data:/qdrant/storage 
  ollama:
    image: ollama/ollama:latest
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama
volumes:
  qdrant-data:
  ollama: